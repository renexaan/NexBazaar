<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexBazaar — Admin Dashboard</title>
  <link rel="stylesheet" href="src/styles/global.css">
  <style>
    /* ── Admin-specific Aurora overrides ── */
    .admin-hero {
      padding: 48px 0 32px;
      position: relative;
    }
    .admin-hero::after {
      content: '';
      position: absolute; left: 0; bottom: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.4), rgba(6,182,212,0.4), transparent);
      margin-bottom: -1px;
    }
    .admin-tabs {
      display: flex; gap: 6px;
      margin-bottom: 28px;
      padding: 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      width: fit-content;
    }
    .tab-btn {
      padding: 9px 20px; border-radius: 11px;
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.4);
      transition: all 0.25s ease; letter-spacing: -0.01em;
    }
    .tab-btn:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }
    .tab-btn.active {
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      box-shadow: 0 4px 16px rgba(124,58,237,0.4);
    }

    .section-container {
      background: rgba(16, 16, 22, 0.8) !important;
      border: 1px solid rgba(255,255,255,0.07) !important;
      backdrop-filter: blur(20px);
    }
    .section-container h2 {
      font-size: 16px !important; font-weight: 700 !important;
      color: rgba(255,255,255,0.6) !important;
      letter-spacing: 0.06em !important; text-transform: uppercase !important;
      font-size: 11px !important; margin-bottom: 20px !important;
    }

    /* ── Order Card — Dark Aurora ── */
    .order-card {
      background: rgba(22, 22, 31, 0.7);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 22px; margin-bottom: 14px;
      display: flex; flex-direction: column; gap: 16px;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .order-card:hover {
      border-color: rgba(124,58,237,0.3);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .order-header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .order-customer { display: flex; align-items: center; gap: 12px; }
    .order-customer-info { display: flex; flex-direction: column; gap: 2px; }
    .order-customer-name { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: -0.02em; }
    .order-customer-email { font-size: 12px; color: rgba(255,255,255,0.35); }

    .order-items-list { display: flex; flex-direction: column; gap: 8px; }
    .order-item-row {
      display: flex; justify-content: space-between;
      font-size: 13px; color: rgba(255,255,255,0.5);
      padding: 8px 12px; background: rgba(255,255,255,0.03);
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.04);
    }
    .order-item-row span:last-child { color: rgba(255,255,255,0.7); font-weight: 600; }

    .order-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .order-total { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.04em; }

    .admin-message-input {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; font-size: 13px; font-family: inherit;
      color: rgba(255,255,255,0.85); margin-top: 10px;
      outline: none; transition: border-color 0.2s ease, box-shadow 0.2s ease;
      resize: none;
    }
    .admin-message-input::placeholder { color: rgba(255,255,255,0.25); }
    .admin-message-input:focus { border-color: rgba(124,58,237,0.5); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }

    /* ── Welcome Banner ── */
    .welcome-banner {
      background: linear-gradient(135deg, rgba(124,58,237,0.12) 0%, rgba(6,182,212,0.08) 100%);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 20px; padding: 20px 24px; margin-bottom: 32px;
      display: flex; align-items: center; gap: 16px;
    }
    .welcome-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 22px;
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
    }
    .welcome-text h3 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.03em; }
    .welcome-text p  { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 2px; }

    /* ── Order badge status ── */
    .order-status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor; display: inline-block; margin-right: 6px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="admin.html" class="navbar-brand">
      <img src="logo.png" alt="NexBazaar" class="navbar-logo-img">
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-user" id="navbarUser">
      <div class="spinner"></div>
    </div>
  </nav>

  <main class="page-content">

    <div class="admin-hero">
      <h1 class="section-title" style="font-size: 32px;">Admin Dashboard</h1>
      <p class="section-sub">Platform governance & oversight.</p>
    </div>

    <!-- Welcome banner -->
    <div class="welcome-banner" id="welcomeBanner">
      <div class="spinner"></div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('users')">Customer Approvals</button>
      <button class="tab-btn" onclick="switchTab('orders')">Order Requests</button>
    </div>

    <!-- Users Section -->
    <div id="usersSection">
      <div class="section-container">
        <h2>Pending Account Access</h2>
        <div id="pendingUsersContainer">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- Orders Section -->
    <div id="ordersSection" class="hidden">
      <div class="section-container">
        <h2>Pending Order Requests</h2>
        <div id="pendingOrdersContainer">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

  </main>

  <script src="src/auth.js"></script>
  <script src="src/admin.js"></script>
</body>
</html>
