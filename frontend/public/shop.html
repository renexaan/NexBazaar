<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexBazaar — Shop Premium</title>
  <link rel="stylesheet" href="src/styles/global.css">
  <link rel="stylesheet" href="src/styles/shop.css">
  <!-- GSAP for smooth animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

  <!-- Interactive Background Canvas -->
  <canvas id="bgCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: #000;"></canvas>
  <div class="bg-mesh"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="shop.html" class="navbar-brand">
      <img src="logo.png" alt="NexBazaar" class="navbar-logo-img">
    </a>
    <div class="navbar-spacer"></div>
    <a href="orders.html" style="color: white; margin-right: 20px; text-decoration: none; font-size: 14px; font-weight: 500; opacity: 0.8; transition: opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8">My Orders</a>
    <div class="navbar-user" id="navbarUser">
      <div class="spinner"></div>
    </div>
  </nav>

  <main>
    <!-- Hero Section -->
    <header class="shop-hero" id="shopHero">
      <h1 class="gsap-reveal">Everything you need. <br>Exactly where you want it.</h1>
      <p class="section-sub gsap-reveal" style="font-size: 18px; margin-bottom: 40px;">Select a category and start your procurement request.</p>
      
      <div class="scroll-hint">
        <span>Scroll to explore</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
        </svg>
      </div>
    </header>

    <!-- The Reveal Group -->
    <div id="revealGroup">
      <!-- Category Navigation -->
      <div class="category-nav gsap-reveal" id="categoryNav">
        <button class="cat-pill active" onclick="filterCategory(null, this)">All Products</button>
      </div>

      <!-- Shop Interface -->
      <div id="shopInterface">
        <div class="product-grid" id="productGrid"></div>
      </div>
    </div>

    <!-- States -->
    <div class="empty-state hidden" id="pendingState">
      <div class="empty-icon" style="background: rgba(255, 214, 10, 0.15);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-yellow);">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </div>
      <p class="empty-title">Approval Pending</p>
      <p class="empty-sub">Your account is currently under review by an administrator.</p>
    </div>

  </main>

  <!-- Cart Float -->
  <div class="cart-float" onclick="toggleCart(true)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path>
    </svg>
    <div class="cart-count" id="cartCount">0</div>
  </div>

  <!-- Cart Drawer (Glassmorphic) -->
  <div class="cart-drawer" id="cartDrawer" style="background: rgba(255,255,255,0.8); backdrop-filter: blur(40px);">
    <div class="cart-header">
      <h2 class="cart-title">Your Order</h2>
      <div class="cart-close" onclick="toggleCart(false)">&times;</div>
    </div>
    <div class="cart-items">
      <!-- Section 1: Active Cart -->
      <div id="activeCartSection">
        <h3 style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-blue); margin-bottom: 12px; opacity: 0.8;">Live Selection</h3>
        <div id="cartItems">
          <!-- Active items populated by JS -->
        </div>
      </div>

      <!-- Section 2: Awaiting Approval -->
      <div id="pendingOrdersSection" style="margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(0,0,0,0.05);">
        <h3 style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #ff9500; margin-bottom: 12px; opacity: 0.8;">Awaiting Approval</h3>
        <div id="historyItems">
          <!-- History items populated by JS -->
        </div>
      </div>

      <!-- Section 3: Processed Requests -->
      <div id="processedOrdersSection" style="margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(0,0,0,0.05);">
        <h3 style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-blue); margin-bottom: 12px; opacity: 0.8;">Recent Decisions</h3>
        <div id="processedItems">
          <!-- Processed items populated by JS -->
        </div>
      </div>
    </div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span>Subtotal</span>
        <span id="cartTotal">₹0</span>
      </div>
      <button class="btn-primary cart-checkout-btn" style="background: #000; color: #fff;" id="checkoutBtn" onclick="submitOrder()">Submit Request</button>
    </div>
  </div>

  <script src="src/auth.js"></script>
  <script src="src/shop.js"></script>
</body>
</html>
