<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexBazaar — Sign In</title>
  <link rel="stylesheet" href="src/styles/global.css">
  <link rel="stylesheet" href="src/styles/login.css">
</head>
<body>

  <div class="login-root">

    <!-- Left panel — brand / hero -->
    <div class="login-left">
      <div class="login-left-inner">
        <a href="#" class="brand">
          <img src="logo.png" alt="NexBazaar" class="brand-logo-img">
        </a>

        <div class="hero-text">
          <h1>Commerce built<br>for <em>everyone.</em></h1>
          <p>One platform for customers and administrators. Sign in with Google to continue.</p>
        </div>

        <div class="trust-badges">
          <div class="trust-item">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
            <span>Secure OAuth 2.0</span>
          </div>
          <div class="trust-item">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span>Role-based access</span>
          </div>
          <div class="trust-item">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
            <span>JWT sessions</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel — sign in card -->
    <div class="login-right">
      <div class="login-card">

        <!-- Logo (mobile only) -->
        <div class="card-logo">
          <img src="logo.png" alt="NexBazaar" class="card-logo-img">
        </div>

        <h2 class="card-title">Welcome back</h2>
        <p class="card-sub">Choose your role and sign in with Google</p>

        <!-- Error banner -->
        <div class="error-banner hidden" id="errorBanner">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
          <span id="errorMessage"></span>
        </div>

        <!-- Role selection -->
        <p class="field-label">Sign in as</p>
        <div class="role-grid">
          <button class="role-card" data-role="customer" id="roleCustomer">
            <div class="role-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61H19a2 2 0 001.99-1.78l1.01-7.22H6"/>
              </svg>
            </div>
            <div class="role-info">
              <span class="role-name">Customer</span>
              <span class="role-desc">Browse & shop products</span>
            </div>
            <div class="role-check" id="checkCustomer">
              <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l3-3z" clip-rule="evenodd"/></svg>
            </div>
          </button>

          <button class="role-card" data-role="admin" id="roleAdmin">
            <div class="role-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/>
              </svg>
            </div>
            <div class="role-info">
              <span class="role-name">Admin</span>
              <span class="role-desc">Manage the platform</span>
            </div>
            <div class="role-check" id="checkAdmin">
              <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l3-3z" clip-rule="evenodd"/></svg>
            </div>
          </button>
        </div>

        <!-- Google sign in button -->
        <button class="google-btn" id="googleBtn" disabled>
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span id="googleBtnText">Select a role to continue</span>
        </button>

        <p class="card-footer-text">
          By signing in you agree to our
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </p>
      </div>
    </div>

  </div>

  <script src="src/login.js"></script>
</body>
</html>
